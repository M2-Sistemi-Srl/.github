name: Setup Dependabot on all repos

on:
  schedule:
    - cron: '0 8 * * 1'  # ogni lunedì alle 8:00
  workflow_dispatch:       # eseguibile anche manualmente

jobs:
  setup-dependabot:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Dependabot config on all org repos
        env:
          GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN }}
          ORG: ${{ github.repository_owner }}
        run: |
          DEPENDABOT_CONTENT=$(cat <<'EOF'
          version: 2
          updates:
            - package-ecosystem: "npm"
              directory: "/"
              schedule:
                interval: "weekly"
              target-branch: "develop"
          EOF
          )

          # Recupera tutti i repo dell'org
          gh repo list "$ORG" --limit 1000 --json nameWithOwner -q '.[].nameWithOwner' | while read repo; do
            
            # Salta il repo .github stesso
            if [[ "$repo" == "$ORG/.github" ]]; then
              continue
            fi

            # Controlla se il file esiste già
            if gh api "repos/$repo/contents/.github/dependabot.yml" &>/dev/null 2>&1; then
              echo "✅ $repo — già presente, skip"
              continue
            fi

            # Controlla se il branch develop esiste
            if ! gh api "repos/$repo/git/refs/heads/develop" &>/dev/null 2>&1; then
              echo "⚠️  $repo — branch 'develop' non trovato, skip"
              continue
            fi

            # Crea il file
            echo "$DEPENDABOT_CONTENT" | gh api \
              --method PUT \
              "repos/$repo/contents/.github/dependabot.yml" \
              --field message="ci: add dependabot config" \
              --field content="$(echo "$DEPENDABOT_CONTENT" | base64 -w 0)" \
              --field branch="develop" \
              && echo "🚀 $repo — dependabot.yml creato" \
              || echo "❌ $repo — errore nella creazione"
          done
