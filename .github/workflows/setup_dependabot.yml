name: Setup Dependabot on all repos

on:
  schedule:
    - cron: '0 8 * * 1'  # ogni lunedì alle 8:00
  workflow_dispatch:       # eseguibile anche manualmente
    inputs:
      force:
        description: 'Sovrascrivi dependabot.yml anche se già presente (true/false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  setup-dependabot:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Dependabot config on all org repos
        env:
          GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN }}
          ORG: ${{ github.repository_owner }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          # Funzione: tenta push diretto, se bloccato apre una PR
          push_or_pr() {
            local repo=$1
            local default_branch=$2
            local encoded_content=$3
            local existing_sha=$4
            local is_update=$5   # "true" se aggiornamento, "false" se creazione

            local commit_msg pr_title
            if [[ "$is_update" == "true" ]]; then
              commit_msg="ci: update dependabot config (force)"
              pr_title="ci: update dependabot config"
            else
              commit_msg="ci: add dependabot config"
              pr_title="ci: add dependabot config"
            fi

            # --- Tentativo 1: push diretto sul branch di default ---
            local push_result
            if [[ "$is_update" == "true" ]]; then
              push_result=$(gh api \
                --method PUT \
                "repos/$repo/contents/.github/dependabot.yml" \
                --field message="$commit_msg" \
                --field content="$encoded_content" \
                --field branch="$default_branch" \
                --field sha="$existing_sha" \
                2>&1)
            else
              push_result=$(gh api \
                --method PUT \
                "repos/$repo/contents/.github/dependabot.yml" \
                --field message="$commit_msg" \
                --field content="$encoded_content" \
                --field branch="$default_branch" \
                2>&1)
            fi

            if echo "$push_result" | grep -q '"sha"'; then
              if [[ "$is_update" == "true" ]]; then
                echo "🔄 $repo — dependabot.yml sovrascritto (force)"
              else
                echo "🚀 $repo — dependabot.yml creato"
              fi
              return 0
            fi

            # --- Tentativo 2: branch temporaneo + PR ---
            if echo "$push_result" | grep -q "Repository rule violations\|must be made through a pull request"; then
              echo "⚠️  $repo — push diretto bloccato, apro PR..."

              local temp_branch="dependabot-setup-$(date +%s)"

              # Recupera lo SHA del commit HEAD del default branch
              local head_sha
              head_sha=$(gh api "repos/$repo/git/ref/heads/$default_branch" --jq '.object.sha' 2>/dev/null)
              if [[ -z "$head_sha" ]]; then
                echo "❌ $repo — impossibile recuperare HEAD sha"
                return 1
              fi

              # Crea il branch temporaneo
              gh api \
                --method POST \
                "repos/$repo/git/refs" \
                --field ref="refs/heads/$temp_branch" \
                --field sha="$head_sha" \
                > /dev/null 2>&1 || { echo "❌ $repo — errore creazione branch temporaneo"; return 1; }

              # Push del file sul branch temporaneo
              local put_result
              if [[ "$is_update" == "true" ]]; then
                put_result=$(gh api \
                  --method PUT \
                  "repos/$repo/contents/.github/dependabot.yml" \
                  --field message="$commit_msg" \
                  --field content="$encoded_content" \
                  --field branch="$temp_branch" \
                  --field sha="$existing_sha" \
                  2>&1)
              else
                put_result=$(gh api \
                  --method PUT \
                  "repos/$repo/contents/.github/dependabot.yml" \
                  --field message="$commit_msg" \
                  --field content="$encoded_content" \
                  --field branch="$temp_branch" \
                  2>&1)
              fi

              if ! echo "$put_result" | grep -q '"sha"'; then
                echo "❌ $repo — errore push su branch temporaneo"
                gh api --method DELETE "repos/$repo/git/refs/heads/$temp_branch" > /dev/null 2>&1
                return 1
              fi

              # Apri la PR
              local pr_url
              pr_url=$(gh api \
                --method POST \
                "repos/$repo/pulls" \
                --field title="$pr_title" \
                --field body="Aggiunta automatica del file \`.github/dependabot.yml\` tramite workflow centralizzato." \
                --field head="$temp_branch" \
                --field base="$default_branch" \
                --jq '.html_url' 2>/dev/null)

              if [[ -n "$pr_url" ]]; then
                echo "📬 $repo — PR aperta: $pr_url"
              else
                echo "❌ $repo — errore apertura PR"
                gh api --method DELETE "repos/$repo/git/refs/heads/$temp_branch" > /dev/null 2>&1
                return 1
              fi
            else
              echo "❌ $repo — errore imprevisto: $push_result"
              return 1
            fi
          }

          # Recupera tutti i repo dell'org (con paginazione automatica)
          gh api "orgs/$ORG/repos" --paginate --jq '.[].full_name' | while read repo; do

            # Salta il repo .github stesso
            if [[ "$repo" == "$ORG/.github" ]]; then
              continue
            fi

            # Recupera il branch di default del repo
            DEFAULT_BRANCH=$(gh api "repos*
