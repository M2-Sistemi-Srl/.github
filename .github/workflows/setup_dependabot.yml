name: Setup Dependabot on all repos

on:
  schedule:
    - cron: '0 8 * * 1'  # ogni lunedì alle 8:00
  workflow_dispatch:
    inputs:
      force:
        description: 'Sovrascrivi dependabot.yml anche se già presente (true/false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  setup-dependabot:
    runs-on: ubuntu-latest
    steps:
      - name: Verifica token e accesso org
        env:
          GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN }}
          ORG: ${{ github.repository_owner }}
        run: |
          set +e
          echo "=== Verifica token ==="
          if [[ -z "$GH_TOKEN" ]]; then
            echo "ERRORE: ORG_AUTOMATION_TOKEN non impostato!"
            exit 1
          fi
          echo "Token presente: OK"
          echo "=== Verifica accesso org ==="
          RESULT=$(gh api "orgs/$ORG" --jq '.login' 2>&1)
          echo "Risposta API org: $RESULT"
          echo "=== Lista repo (prime 5) ==="
          gh api "orgs/$ORG/repos?per_page=5" --jq '.[].full_name' 2>&1
          echo "=== Fine diagnostica ==="

      - name: Setup Dependabot config on all org repos
        env:
          GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN }}
          ORG: ${{ github.repository_owner }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set +e

          push_or_pr() {
            local repo=$1
            local default_branch=$2
            local encoded_content=$3
            local existing_sha=$4
            local is_update=$5

            local commit_msg pr_title pr_body
            if [[ "$is_update" == "true" ]]; then
              commit_msg="ci: update dependabot config (force)"
              pr_title="ci: update dependabot config"
            else
              commit_msg="ci: add dependabot config"
              pr_title="ci: add dependabot config"
            fi
            pr_body="Aggiunta automatica del file .github/dependabot.yml tramite workflow centralizzato."

            local push_result
            if [[ "$is_update" == "true" ]]; then
              push_result=$(gh api \
                --method PUT \
                "repos/$repo/contents/.github/dependabot.yml" \
                --field message="$commit_msg" \
                --field content="$encoded_content" \
                --field branch="$default_branch" \
                --field sha="$existing_sha" \
                2>&1)
            else
              push_result=$(gh api \
                --method PUT \
                "repos/$repo/contents/.github/dependabot.yml" \
                --field message="$commit_msg" \
                --field content="$encoded_content" \
                --field branch="$default_branch" \
                2>&1)
            fi

            if echo "$push_result" | grep -q '"sha"'; then
              if [[ "$is_update" == "true" ]]; then
                echo "UPDATED: $repo"
              else
                echo "CREATED: $repo"
              fi
              return 0
            fi

            if echo "$push_result" | grep -q "Repository rule violations\|must be made through a pull request"; then
              echo "BLOCKED: $repo - apro PR..."

              local temp_branch="dependabot-setup-$(date +%s)"
              local head_sha
              head_sha=$(gh api "repos/$repo/git/ref/heads/$default_branch" --jq '.object.sha' 2>/dev/null)
              if [[ -z "$head_sha" ]]; then
                echo "ERROR: $repo - impossibile recuperare HEAD sha"
                return 0
              fi

              gh api \
                --method POST \
                "repos/$repo/git/refs" \
                --field ref="refs/heads/$temp_branch" \
                --field sha="$head_sha" \
                > /dev/null 2>&1
              if [[ $? -ne 0 ]]; then
                echo "ERROR: $repo - errore creazione branch temporaneo"
                return 0
              fi

              local put_result
              if [[ "$is_update" == "true" ]]; then
                put_result=$(gh api \
                  --method PUT \
                  "repos/$repo/contents/.github/dependabot.yml" \
                  --field message="$commit_msg" \
                  --field content="$encoded_content" \
                  --field branch="$temp_branch" \
                  --field sha="$existing_sha" \
                  2>&1)
              else
                put_result=$(gh api \
                  --method PUT \
                  "repos/$repo/contents/.github/dependabot.yml" \
                  --field message="$commit_msg" \
                  --field content="$encoded_content" \
                  --field branch="$temp_branch" \
                  2>&1)
              fi

              if ! echo "$put_result" | grep -q '"sha"'; then
                echo "ERROR: $repo - errore push su branch temporaneo"
                gh api --method DELETE "repos/$repo/git/refs/heads/$temp_branch" > /dev/null 2>&1
                return 0
              fi

              local pr_url
              pr_url=$(gh api \
                --method POST \
                "repos/$repo/pulls" \
                --field title="$pr_title" \
                --field body="$pr_body" \
                --field head="$temp_branch" \
                --field base="$default_branch" \
                --jq '.html_url' 2>/dev/null)

              if [[ -n "$pr_url" ]]; then
                echo "PR_OPENED: $repo - $pr_url"
              else
                echo "ERROR: $repo - errore apertura PR"
                gh api --method DELETE "repos/$repo/git/refs/heads/$temp_branch" > /dev/null 2>&1
              fi
            else
              echo "ERROR: $repo - $push_result"
            fi
            return 0
          }

          REPOS=$(gh api "orgs/$ORG/repos" --paginate --jq '.[].full_name' 2>&1)
          if [[ $? -ne 0 ]]; then
            echo "ERRORE recupero lista repo: $REPOS"
            exit 1
          fi

          echo "$REPOS" | while read repo; do
            if [[ "$repo" == "$ORG/.github" ]]; then
              continue
            fi

            DEFAULT_BRANCH=$(gh api "repos/$repo" --jq '.default_branch' 2>/dev/null)
            if [[ -z "$DEFAULT_BRANCH" ]]; then
              echo "ERROR: $repo - impossibile recuperare default branch"
              continue
            fi

            ENCODED_CONTENT=$(printf 'version: 2\nupdates:\n  - package-ecosystem: "npm"\n    directory: "/"\n    schedule:\n      interval: "weekly"\n    target-branch: "%s"\n' "$DEFAULT_BRANCH" | base64 -w 0)

            EXISTING_SHA=$(gh api "repos/$repo/contents/.github/dependabot.yml" --jq '.sha' 2>/dev/null || echo "")

            if [[ -n "$EXISTING_SHA" ]]; then
              if [[ "$FORCE" == "true" ]]; then
                push_or_pr "$repo" "$DEFAULT_BRANCH" "$ENCODED_CONTENT" "$EXISTING_SHA" "true"
              else
                echo "SKIP: $repo - gia presente"
              fi
              continue
            fi

            push_or_pr "$repo" "$DEFAULT_BRANCH" "$ENCODED_CONTENT" "" "false"
          done

          exit 0
